<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="index.css">
  <title>My First HTML Page</title>
</head>

<body>
    <header class="watchlist">
      <p class="visually-hidden">
          Background image includes movie posters from Scarface, The Dark Knight, and The Godfather.
      </p>
      <div class="container-title">
      <h1 id="find-your-film">Find your film</h1>
      <h3 id="watchlist-link" class="subtitle"><a href="mywatchlist.html">My Watchlist</a></h3>
      </div>
    </header>
    
    <div class="search-container">
      <div class="search-box"> 
        <input id="search-input" type="search" name="q" placeholder="Search..." >
        <button id="search-button" aria-label="Submit Search">Search</button>  
      </div>
    </div>
  
    <div id="movies-container" class="movie-container">
      <div id="no-data-img-container">
        <img id="no-data-img" alt="Film reel Icon and the words Start Exploring" src="/images/no-data-initial.png"/>
      </div>
    </div>
<script src="index.js"></script>
</body>
</html>
